<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#18181b">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="双打记分">
  <link rel="manifest" href="./manifest.json">
  <title>乒乓球双打辅助记分器</title>
  <link rel="stylesheet" href="./src/styles.css">
</head>

<body>
  <main class="app-shell" id="app">
    <section class="topbar" aria-label="顶部控制栏">
      <div class="controls-left" id="protectedTopLeft">
        <button id="bestOfBtn" aria-label="切换局制">五局三胜</button>
        <button id="targetBtn" aria-label="切换 11 分制或旧 21 分制">11 分制</button>
      </div>
      <div class="match-strip" aria-live="polite">
        <span class="match-score" id="setsA">0</span>
        <span class="set-label" id="setLabel">第一局</span>
        <span class="match-score" id="setsB">0</span>
      </div>
      <div class="controls-right">
        <button id="helpBtn" aria-label="打开规则帮助">帮助</button>
        <button id="swapBtn" aria-label="切换视觉场地">视觉换边</button>
      </div>
    </section>

    <section class="main">
      <article class="score-panel team-a-panel" aria-label="甲队计分区">
        <div class="score-card">
          <div class="team-title"><strong id="teamNameA">甲队</strong><small><span id="scoreA" aria-live="polite">0</span>
              <span id="pointsUnitA">分</span></small>
          </div>
        </div>
        <div class="add-card">
          <button class="add-btn a" id="addA" aria-label="甲队得分，点击增加一分">+1<span class="last-point" id="lastA">甲队
              得分</span><span class="sr-only">甲队加一分</span></button>
        </div>
      </article>

      <article class="center-panel">
        <div class="sr-only" id="statusBanner" role="status" aria-live="assertive">请选择先发球员</div>
        <div class="court" id="court" aria-label="双打球台与发接发站位">
          <div class="table-surface" id="tableSurface" aria-hidden="true">
            <div class="net"></div>
          </div>
          <div class="setup-chip" id="setupChip" aria-hidden="true">请选择先发球员</div>
          <svg class="serve-svg" aria-hidden="true">
            <defs>
              <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"
                markerUnits="strokeWidth">
                <path d="M0,0 L0,6 L9,3 z" fill="#fbbf24"></path>
              </marker>
            </defs>
            <line id="serveLine" x1="0" y1="0" x2="0" y2="0" stroke="#fbbf24" stroke-width="4" stroke-dasharray="10 9"
              marker-end="url(#arrow)" opacity="0"></line>
          </svg>
          <button class="player dim" id="pA1" data-player="A1"
            aria-label="选择 A1"><span>A1</span><small></small></button>
          <button class="player dim" id="pA2" data-player="A2"
            aria-label="选择 A2"><span>A2</span><small></small></button>
          <button class="player dim" id="pB1" data-player="B1"
            aria-label="选择 B1"><span>B1</span><small></small></button>
          <button class="player dim" id="pB2" data-player="B2"
            aria-label="选择 B2"><span>B2</span><small></small></button>
        </div>
        <div class="sr-only" id="historyHint" aria-live="polite">历史记录就绪</div>
      </article>

      <article class="score-panel team-b-panel" aria-label="乙队计分区">
        <div class="score-card">
          <div class="team-title"><strong id="teamNameB">乙队</strong><small><span id="scoreB" aria-live="polite">0</span>
              <span id="pointsUnitB">分</span></small>
          </div>
        </div>
        <div class="add-card">
          <button class="add-btn b" id="addB" aria-label="乙队得分，点击增加一分">+1<span class="last-point" id="lastB">乙队
              得分</span><span class="sr-only">乙队加一分</span></button>
        </div>
      </article>
    </section>

    <section class="toolbar" aria-label="底部工具栏">
      <div class="tool-left" id="protectedBottomLeft">
        <button class="danger-btn" id="resetBtn" aria-label="重置整场比赛">重置</button>
        <button class="primary-btn" id="quickBtn" aria-label="打开快速设置面板">快速设置</button>
      </div>
      <div style="display:flex;justify-content:center">
        <button class="warn-btn" id="undoBtn" aria-label="撤销上一步操作">撤销</button>
      </div>
      <div class="tool-right">
        <button id="advancedBtn" aria-label="打开高级设置">高级设置</button>
        <div class="lock-wrap">
          <button class="lock-btn" id="lockBtn" aria-label="点击锁定，长按一点五秒解锁">锁定</button>
          <div class="lock-progress" aria-hidden="true"><i id="lockProgress"></i></div>
        </div>
      </div>
    </section>
  </main>
    <!-- SITE_FOOTER -->
<div class="modal-backdrop" id="modalBackdrop" role="presentation">
    <section class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle"></section>
  </div>

  <script src="./src/app.js"></script>
</body>

</html>
